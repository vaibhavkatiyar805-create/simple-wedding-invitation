        /* 1. SCRATCH OVERLAY */
        #scratch-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

        }

        canvas { position: absolute; top: 0; left: 0; border-radius: 50%; cursor: crosshair; touch-action: none; }
