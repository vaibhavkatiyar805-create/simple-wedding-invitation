<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/> 
    <title>Aastha & Anupam | The Royal Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root { --gold: #d4af37; --dark-blue: #1e293b; --cream: #faf9f6; --text: #4a4a4a; --warm-yellow: #fdf5e6; --ghibli-sky: #87CEEB; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--cream); font-family: 'Montserrat', sans-serif; color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        /* 1. HEART SCRATCH & GANESH REVEAL (RESIZED) */
        #scratch-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99999; background: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1.5s ease;
        }
        
        .heart-mask-container {
            position: relative; 
            width: 350px; /* Expanded size */
            height: 350px; 
            margin: 0 auto;
            -webkit-mask-image: url('https://img.icons8.com/ios-filled/500/ffffff/like.png');
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
            mask-image: url('https://img.icons8.com/ios-filled/500/ffffff/like.png');
            mask-size: contain; mask-repeat: no-repeat; mask-position: center;
            background: var(--warm-yellow);
        }
        
        .ganesh-reveal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; z-index: 1;
        }
        .ganesh-reveal img { width: 140px; max-height: 160px; object-fit: contain; margin-bottom: 15px; }
        .ganesh-reveal h3 { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--dark-blue); letter-spacing: 3px; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; touch-action: none; transition: opacity 1s ease; }
        
        .scratch-hint { margin-top: 30px; font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 4px; color: var(--gold); animation: pulse 2s infinite; }
        .tap-reveal { margin-top: 15px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: #888; cursor: pointer; }

        /* 2. HERO SECTION (GHIBLI STYLE) */
        .hero { 
            position: relative; height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; overflow: hidden;
            /* Ghibli-esque Painterly Background */
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 50%, #fdf5e6 100%);
        }

        /* Whimsical Clouds/Mist */
        .hero::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: url('https://www.transparenttextures.com/patterns/natural-paper.png'), 
                        linear-gradient(to top, rgba(255,255,255,0.8), transparent);
            z-index: 2;
        }

        .hero-content { position: relative; z-index: 10; padding: 20px; }
        .hero-names { 
            font-family: 'Great Vibes', cursive; font-size: 7rem; color: #2c3e50; 
            line-height: 1; text-shadow: 2px 2px 0px rgba(255,255,255,0.5); 
        }
        .hero-weds { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold); letter-spacing: 12px; margin: 25px 0; }

        /* Floating Ghibli "Soot" Dust Particles */
        .soot {
            position: absolute; background: rgba(0,0,0,0.7); border-radius: 50%;
            z-index: 5; animation: floatSoot 10s infinite ease-in-out;
        }
        @keyframes floatSoot {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(10deg); }
            66% { transform: translate(-20px, -100px) rotate(-10deg); }
        }

        /* Existing Lanterns & Transitions */
        .lantern {
            position: absolute; bottom: -100px; width: 40px; height: 60px;
            background: radial-gradient(circle at 50% 50%, #ffdaa3, #ff8c00);
            border-radius: 5px 5px 10px 10px; box-shadow: 0 0 30px rgba(255, 140, 0, 0.8);
            z-index: 5; opacity: 0; animation: floatUp linear infinite;
        }
        
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 0.9; } 100% { transform: translateY(-120vh) scale(1.2); opacity: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* 3. REST OF STYLES (Kept from your original) */
        .countdown-section { padding: 80px 20px; background: var(--dark-blue); text-align: center; color: white; }
        .timer-wrapper { display: flex; gap: 20px; justify-content: center; }
        .time-box span { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--gold); }
        /* ... (Include other original styles here) ... */
        .family-section { padding: 100px 20px; background: var(--warm-yellow); text-align: center; }
        .family-grid { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .family-box { background: white; padding: 40px; width: 45%; min-width: 320px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="scratch-wrapper">
        <h2 style="font-family: 'Cinzel', serif; font-size: 2rem; margin-bottom: 30px; color: var(--dark-blue);">Aastha & Anupam</h2>
        
        <div class="heart-mask-container">
            <div class="ganesh-reveal">
                <img src="ganesh2.png" alt="Ganesh Ji">
                <h3>Save the Date</h3>
            </div>
            <canvas id="scratch-canvas" width="350" height="350"></canvas>
        </div>

        <p class="scratch-hint">SCRATCH THE HEART</p>
        <div class="tap-reveal" onclick="triggerReveal()">Or Tap to Reveal</div>
    </div>

    <audio id="weddingAudio" loop preload="auto"><source src="music.mp3.mp3" type="audio/mpeg"></audio>

    <div id="main-site" style="visibility: hidden; opacity: 0; transition: opacity 1.5s ease;">
        <section class="hero">
            <div class="soot" style="width: 8px; height: 8px; left: 15%; top: 20%; animation-delay: 1s;"></div>
            <div class="soot" style="width: 5px; height: 5px; left: 80%; top: 40%; animation-delay: 3s;"></div>
            
            <div class="lantern" style="left: 10%; animation-duration: 12s;"></div>
            <div class="lantern" style="left: 70%; animation-duration: 14s;"></div>

            <div class="hero-content" data-aos="zoom-in" data-aos-duration="1500">
                <div class="hero-names">Aastha</div>
                <div class="hero-weds">WEDS</div>
                <div class="hero-names">Anupam</div>
                <p style="margin-top: 20px; font-size: 0.9rem; letter-spacing: 5px; color: #555;">MAY 03, 2026</p>
            </div>
        </section>

        <section class="countdown-section">
            <h2 style="font-family: 'Cinzel', serif; margin-bottom: 30px;">Countdown to our Big Day</h2>
            <div class="timer-wrapper">
                <div class="time-box"><span id="days">00</span><p>Days</p></div>
                <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
                <div class="time-box"><span id="mins">00</span><p>Mins</p></div>
                <div class="time-box"><span id="secs">00</span><p>Secs</p></div>
            </div>
        </section>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isScratching = false;
        let isRevealing = false;

        // Fill Gold (NO TEXT ADDED HERE NOW)
        ctx.fillStyle = '#d4af37';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        function handleScratch(e) {
            if (!isScratching || isRevealing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fill();
            
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearCount = 0;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] === 0) clearCount++; }
            if (clearCount > (pixels.length / 4) * 0.50) triggerReveal();
        }

        function triggerReveal() {
            if (isRevealing) return;
            isRevealing = true;
            canvas.style.opacity = '0';
            setTimeout(() => {
                const wrapper = document.getElementById('scratch-wrapper');
                const mainSite = document.getElementById('main-site');
                wrapper.style.opacity = '0';
                setTimeout(() => {
                    wrapper.style.display = 'none';
                    mainSite.style.visibility = 'visible';
                    mainSite.style.opacity = '1';
                    document.getElementById('weddingAudio').play().catch(e => console.log("Audio blocked"));
                    AOS.init({ duration: 1000, once: true });
                }, 1000);
            }, 3000);
        }

        canvas.addEventListener('mousedown', () => isScratching = true);
        canvas.addEventListener('touchstart', (e) => { isScratching = true; e.preventDefault(); });
        window.addEventListener('mouseup', () => isScratching = false);
        canvas.addEventListener('mousemove', handleScratch);
        canvas.addEventListener('touchmove', (e) => handleScratch(e));

        // Timer
        const target = new Date("May 3, 2026 15:30:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(d / (1000 * 60 * 60 * 24))).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.max(0, Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.max(0, Math.floor((d % (1000 * 60 * 60)) / (1000 * 60))).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.max(0, Math.floor((d % (1000 * 60)) / 1000)).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
