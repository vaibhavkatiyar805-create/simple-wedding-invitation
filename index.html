<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Aastha & Anupam | The Royal Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --cream: #fdfaf5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--cream); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* SCRATCH REVEAL */
        #scratch-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; background: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .canvas-wrapper { position: relative; width: 300px; height: 300px; border-radius: 50%; }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; border-radius: 50%; touch-action: none; }

        /* GHIBLI HERO SECTION */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; color: white;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920'); 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; letter-spacing: 10px; color: var(--gold); text-transform: uppercase; }
        .hero h1 span { display: block; font-family: 'Great Vibes', cursive; font-size: 3rem; text-transform: lowercase; letter-spacing: 2px; }
        
        /* DISCOVER BUTTON */
        .btn-discover {
            padding: 15px 45px; border: 1px solid rgba(255,255,255,0.6); border-radius: 50px;
            color: white; text-decoration: none; font-size: 0.8rem; letter-spacing: 3px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-transform: uppercase;
        }

        #main-content { visibility: hidden; }
    </style>
</head>
<body>
    <div id="scratch-container">
        <div class="canvas-wrapper"><canvas id="scratch-canvas" width="300" height="300"></canvas></div>
        <p style="margin-top:20px; color:var(--gold); letter-spacing:2px;">SCRATCH TO REVEAL</p>
    </div>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="main-content">
        <header class="hero">
            <h1>AASTHA <span>weds</span> ANUPAM</h1>
            <p style="margin: 20px 0; letter-spacing: 5px;">3 MAY 2026 • SHIMLA HILLS</p>
            <a href="#details" class="btn-discover">DISCOVER THE DETAILS</a>
        </header>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        ctx.fillStyle = '#c5a059';
        ctx.fillRect(0, 0, 300, 300);

        function scratch(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
            
            const pix = ctx.getImageData(0,0,300,300).data;
            let count = 0;
            for(let i=3; i<pix.length; i+=4) { if(pix[i]===0) count++; }
            if(count > 40000) {
                document.getElementById('scratch-container').style.display='none';
                document.getElementById('main-content').style.visibility='visible';
                document.getElementById('bgMusic').play();
            }
        }
        canvas.addEventListener('mousedown', () => drawing=true);
        canvas.addEventListener('touchstart', () => drawing=true);
        window.addEventListener('mouseup', () => drawing=false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch);
    </script>
</body>
</html>
