<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anupam & Aastha | Wedding Invitation</title>

    <link rel="stylesheet" href="https://unpkg.com/bulma@0.8.0/css/bulma.min.css" />
    <link rel="stylesheet" type="text/css" href="css/menikah.css" />
    <link rel="stylesheet" type="text/css" href="css/jquery.countdown.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    
    <style>
      :root { --gold: #c5a059; --dark: #1a1a1a; --cream: #fdfaf5; }
      body { background-color: var(--cream); font-family: 'Playfair Display', serif; }

      /* SCRATCH / VIEW OVERLAY */
      #reveal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--dark); color: white; z-index: 10000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        transition: all 0.8s ease-in-out;
      }
      #reveal-overlay.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }

      .reveal-btn {
        padding: 20px 50px; border: 3px solid var(--gold); background: transparent;
        color: var(--gold); cursor: pointer; font-size: 1.5rem; font-weight: bold;
        letter-spacing: 4px; transition: 0.4s; margin-top: 30px; font-family: 'Montserrat', sans-serif;
      }
      .reveal-btn:hover { background: var(--gold); color: white; transform: scale(1.05); }

      /* BIG COUNTDOWN STYLING */
      #hitungmundur { 
        display: flex; justify-content: center; gap: 15px; margin: 40px 0; 
        background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      }
      #hitungmundur li { list-style: none; text-align: center; min-width: 70px; }
      #hitungmundur span { 
        font-size: 3.5rem !important; /* BIG FONT */
        line-height: 1; font-weight: 800; color: var(--gold); font-family: 'Montserrat', sans-serif;
      }
      #hitungmundur p { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-top: 5px; }
