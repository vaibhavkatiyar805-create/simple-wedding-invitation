<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anupam & Aastha | Wedding Invitation</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --cream: #fdfaf5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--cream); font-family: 'Playfair Display', serif; color: #4a4a4a; overflow-x: hidden; }

        /* 1. REVEAL OVERLAY */
        #reveal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); color: white; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1s ease-in-out;
        }
        #reveal-overlay.hidden { opacity: 0; visibility: hidden; transform: translateY(-100%); }

        .reveal-btn {
            padding: 18px 50px; border: 2px solid var(--gold); background: transparent;
            color: var(--gold); cursor: pointer; font-size: 1.3rem; font-weight: bold;
            letter-spacing: 4px; transition: 0.4s; margin-top: 30px; font-family: 'Montserrat', sans-serif;
        }
        .reveal-btn:hover { background: var(--gold); color: white; }

        /* 2. HERO SECTION */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .names { font-family: 'Great Vibes', cursive; font-size: 5rem; color: var(--gold); }
        
        /* 3. BIG COUNTDOWN */
        #timer { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .timer-node span { font-size: 3rem; display: block; font-weight: bold; color: var(--gold); font-family: 'Montserrat', sans-serif; }
        .timer-node p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }

        .section { padding: 60px 20px; text-align: center; }
        .event-card { background: white; padding: 30px; margin: 20px auto; max-width: 600px; border-left: 5px solid var(--gold); text-align: left; }
    </style>
</head>
<body>

    <div id="reveal-overlay">
        <h2 style="font-family: 'Great Vibes'; font-size: 4rem;">Anupam & Aastha</h2>
        <p style="letter-spacing: 5px; font-size: 0.8rem;">THE CELEBRATION OF LOVE</p>
        <button class="reveal-btn" onclick="startInvite()">VIEW INVITATION</button>
    </div>

    <audio id="weddingMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="main-content">
        <header class="hero">
            <div class="container">
                <h1 class="names">Anupam & Aastha</h1>
                <p class="is-size-4">May 3, 2026 | Shimla Hills</p>
                
                <div id="timer">
                    <div class="timer-node"><span id="days">00</span><p>Days</p></div>
                    <div class="timer-node"><span id="hours">00</span><p>Hours</p></div>
                    <div class="timer-node"><span id="mins">00</span><p>Mins</p></div>
                    <div class="timer-node"><span id="secs">00</span><p>Secs</p></div>
                </div>
            </div>
        </header>

        <section class="section">
            <h2 class="names" style="font-size: 3rem;">Wedding Events</h2>
            <div class="event-card">
                <p><strong>Wedding Ceremony</strong></p>
                <p>3rd May 2026 | Hotel Taj Theog, Shimla</p>
            </div>
            <div class="event-card">
                <p><strong>Gala Dinner</strong></p>
                <p>4th May 2026 | Hyatt Centric, Chandigarh</p>
            </div>
        </section>
    </div>

    <script>
        function startInvite() {
            // Hide overlay
            document.getElementById('reveal-overlay').classList.add('hidden');
            // Play your music file
            const audio = document.getElementById('weddingMusic');
            audio.play().catch(error => console.log("Playback failed:", error));
