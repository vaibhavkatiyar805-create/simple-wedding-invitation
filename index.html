<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Animation Library -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fff8f0;
  color: #333;
  text-align: center;
}

/* HERO SECTION */

.hero {
  background-image: url("https://images.unsplash.com/photo-1523438885200-e635ba2c371e");
  background-size: cover;
  background-position: center;
  height: 100vh;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 70px;
  margin: 0;
}

.hero h2 {
  font-size: 28px;
}

/* SECTION */

.section {
  padding: 50px 20px;
}

/* COUNTDOWN */

.countdown {
  font-size: 26px;
  font-weight: bold;
  margin-top: 20px;
}

/* EVENT CARDS */

.event-card {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

/* BUTTON */

.button {
  background: #d4af37;
  color: white;
  padding: 12px 22px;
  border-radius: 25px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;
}

/* GALLERY */

.gallery img {
  width: 90%;
  max-width: 300px;
  border-radius: 12px;
  margin: 10px;
}

/* FOOTER */

.footer {
  background: #222;
  color: white;
  padding: 20px;
}

</style>
</head>

<body>

<!-- MUSIC -->

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->

<div class="hero">

<h1>Aayush & Riya</h1>

<h2>Are Getting Married</h2>

<p>30 April 2026</p>

<div class="countdown" id="countdown"></div>

</div>

<!-- EVENTS -->

<div class="section">

<h2 data-aos="fade-up">Wedding Events</h2>

<div class="event-card" data-aos="zoom-in">

<h3>Mehendi & Hi-Tea</h3>

<p>30 April 2026</p>

<p>4 PM onwards</p>

<p>Hotel Taj Theog</p>

<a
class="button"
href="https://maps.google.com"
target="_blank">

View Location

</a>

</div>

<div class="event-card" data-aos="zoom-in">

<h3>Engagement Ceremony</h3>

<p>1 May 2026</p>

<p>7 PM onwards</p>

<p>Hotel Taj Theog</p>

<a
class="button"
href="https://maps.google.com"
target="_blank">

View Location

</a>

</div>

</div>

<!-- GALLERY -->

<div class="section gallery">

<h2 data-aos="fade-up">Our Memories</h2>

<img
src="https://images.unsplash.com/photo-1519741497674-611481863552">

<img
src="https://images.unsplash.com/photo-1520854221256-17451cc331bf">

<img
src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">

</div>

<!-- FOOTER -->

<div class="footer">

<p>We are excited to celebrate with you ❤️</p>

</div>

<!-- COUNTDOWN SCRIPT -->

<script>

var countDate = new Date("April 30, 2026 16:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();

var distance = countDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));

var hours = Math.floor(
(distance % (1000 * 60 * 60 * 24))
/
(1000 * 60 * 60)
);

var minutes = Math.floor(
(distance % (1000 * 60 * 60))
/
(1000 * 60)
);

document.getElementById("countdown").innerHTML =
days + " Days "
+
hours + " Hours "
+
minutes + " Minutes ";

}, 1000);

</script>

<!-- ANIMATION SCRIPT -->

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();
</script>

</body>

</html>
